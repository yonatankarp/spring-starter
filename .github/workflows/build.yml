name: Continuous Integration

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: yonatankarp/github-actions/.github/workflows/ci.yml@v2
    with:
      image-name: kotlin-spring-boot-template
      dockerfile-path: Dockerfile
      gradle-module: ":kotlin-spring-boot-template-adapters"

  dependabot_auto_merge:
    needs: pipeline
    if: ${{ github.actor == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write
    uses: yonatankarp/github-actions/.github/workflows/dependabot-auto-merge.yml@v2
    secrets:
      GITHUB_PAT: ${{ secrets.REVIEWER_GITHUB_TOKEN }}

  linters:
    uses: yonatankarp/github-actions/.github/workflows/linters.yml@v2
