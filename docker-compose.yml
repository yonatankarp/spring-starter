services:
  postgres:
    container_name: spring-starter-postgres
    networks:
      - proxynet
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "secret"
      POSTGRES_DB: "spring-starter"
    ports:
      - "5432:5432"
    expose:
      - "5432"

networks:
  proxynet:
    name: spring-starter-network
