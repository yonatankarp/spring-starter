openapi: 3.0.3
info:
  title: Greetings (Example) API
  description: |
    Placeholder API shipped with the template. Replace with your service's
    real API spec when bootstrapping a new project. Demonstrates an
    end-to-end reactive request -> use case -> jOOQ-on-R2DBC -> Postgres
    roundtrip through the hexagonal layers.
  contact:
    name: Yonatan Karp-Rudin
    url: http://yonatankarp.com
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: The local development environment

tags:
  - name: GreetingsV1

paths:

  /greetings/random:
    get:
      operationId: get_random_greeting
      summary: Returns a random greeting from the catalog
      description: |
        Returns one randomly-selected greeting from the seeded catalog.
        Falls back to the English default if the catalog is empty.
      tags:
        - GreetingsV1

      responses:
        "200":
          description: |
            A randomly-selected greeting.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreetingResponse"

        "500":
          description: Something unexpected happened on the server side.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:

  schemas:

    GreetingResponse:
      type: object
      required:
        - language
        - message
      properties:
        language:
          type: string
          description: BCP-47 language tag (e.g., 'en', 'en-US').
          example: "en"
        message:
          type: string
          description: The greeting text in the given language.
          example: "Hello, World!"

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: "Not found"
        message:
          type: string
          description: A human-readable error message
          example: "An error occurred while performing the call"
        details:
          type: string
          description: Unstructured additional data to give more details about the error
          example: "The error code"
